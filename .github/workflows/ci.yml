name: CI
on: [push, pull_request]
jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install uv && uv sync
        working-directory: backend
      - run: uv run pytest
        working-directory: backend

  test-frontend:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - run: npm ci
          working-directory: frontend
        - run: npx tsc --noEmit
          working-directory: frontend
        - run: npm run build
          working-directory: frontend